services:
  pebble-relay:
    build: .
    image: pebble-relay:latest
    container_name: pebble-relay
    ports:
      - "8977:8977"
    volumes:
      - pebble-data:/data
    environment:
      - PB_URL=https://pb.osglab.com
      - PB_ADMIN_EMAIL=rocky.hk@gmail.com
      - PB_ADMIN_PASSWORD=gz203799
      - PB_API_TOKEN=${PB_API_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8977/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pebble-data:
