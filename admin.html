<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - Pebble Relay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { font-size: 20px; }
        .header-right { display: flex; gap: 10px; align-items: center; }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 40px;
        }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .login-box h2 { text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #4facfe; }
        button {
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            width: 100%;
            padding: 14px;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            font-size: 14px;
        }
        .btn-danger {
            background: rgba(255,82,82,0.2);
            color: #ff6b6b;
            padding: 8px 16px;
            font-size: 14px;
        }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #4facfe;
        }
        .stat-card .label {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
        }
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .section h3 {
            margin-bottom: 16px;
            font-size: 16px;
            color: #aaa;
        }
        .section h3 .badge {
            font-size: 12px;
            background: rgba(79,172,254,0.2);
            color: #4facfe;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        .create-user-form {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: end;
        }
        .create-user-form input {
            margin-bottom: 0;
        }
        .user-list { margin-top: 16px; }
        .user-item {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 8px;
        }
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .user-info .name { font-weight: 600; font-size: 15px; }
        .user-info .id { font-size: 12px; color: #666; font-family: monospace; margin-top: 4px; }
        .user-info .created { font-size: 12px; color: #555; margin-top: 4px; }
        .user-actions { display: flex; gap: 8px; }
        .instance-list {
            margin-top: 8px;
            padding-left: 16px;
            border-left: 2px solid rgba(255,255,255,0.1);
        }
        .instance-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
            color: #888;
        }
        .instance-item .inst-name { color: #ccc; }
        .instance-item .inst-id { font-family: monospace; font-size: 11px; color: #555; }
        .no-instances { font-size: 12px; color: #555; padding: 4px 0; }
        .user-stats-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .stat-badge {
            font-size: 11px;
            background: rgba(255,255,255,0.08);
            padding: 3px 8px;
            border-radius: 6px;
            color: #888;
        }
        .token-badge {
            cursor: pointer;
            font-family: monospace;
            color: #4facfe;
        }
        .token-badge:hover {
            background: rgba(79,172,254,0.15);
        }
        .token-display {
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
        .token-display .token-label {
            font-size: 12px;
            color: #0f0;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .token-display .token-value {
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 6px;
        }
        .token-display .token-warning {
            font-size: 12px;
            color: #ff6b6b;
            margin-top: 8px;
        }
        .logout-btn {
            background: rgba(255,82,82,0.2);
            color: #ff6b6b;
            width: auto;
            padding: 10px 20px;
            font-size: 14px;
        }
        .hidden { display: none !important; }
        .loading {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,255,136,0.9);
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .toast.show { opacity: 1; }
        .toast.error { background: rgba(255,82,82,0.9); color: #fff; }
        .info-box {
            background: rgba(79,172,254,0.1);
            border: 1px solid rgba(79,172,254,0.2);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }
        .info-box strong { color: #4facfe; }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚙️ Pebble Relay 管理后台</h1>
        <div class="header-right">
            <span id="serverUrl" style="font-size:12px;color:#555;"></span>
            <span id="adminName" class="hidden"></span>
            <button id="logoutBtn" class="logout-btn hidden" onclick="logout()">退出</button>
        </div>
    </div>

    <!-- Login Form -->
    <div id="loginSection" class="login-box">
        <h2>管理员登录</h2>
        <div class="form-group">
            <label>管理员密码</label>
            <input type="password" id="password" placeholder="管理员密码（至少8位）" onkeypress="if(event.key==='Enter')login()">
        </div>
        <button class="btn-primary" onclick="login()">登录</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboardSection" class="container hidden">
        <div class="info-box">
            <strong>用户 Token 说明：</strong>创建用户后请立即复制 Token，此 Token 仅显示一次，无法找回。用户需将此 Token 输入到 watch-claw 插件或 iOS/App 应用中完成绑定。
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="statUsers">-</div>
                <div class="label">用户数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="statInstances">-</div>
                <div class="label">实例数</div>
            </div>
            <div class="stat-card">
                <div class="number" id="statWatches">-</div>
                <div class="label">手表数</div>
            </div>
        </div>

        <div id="dbStatusBox" class="info-box" style="display:none;"></div>

        <div class="section">
            <h3>➕ 创建用户 <span class="badge">直接注册</span></h3>
            <div class="create-user-form">
                <div>
                    <label>用户名称</label>
                    <input type="text" id="newUserName" placeholder="例如：张三的Watch" onkeypress="if(event.key==='Enter')createUser()">
                </div>
                <button class="btn-secondary" onclick="createUser()" style="padding: 14px 24px;">创建</button>
            </div>
            <div id="tokenDisplay" class="token-display hidden">
                <div class="token-label">✅ 用户创建成功 — Token 仅显示一次，请立即复制保存：</div>
                <div class="token-value" id="tokenValue"></div>
                <div class="token-warning">⚠️ 此 Token 无法找回，请妥善保管！</div>
            </div>
        </div>

        <div class="section">
            <h3>👥 用户列表 <span class="badge" id="userCountBadge">0</span></h3>
            <div id="userList" class="user-list">
                <p style="color:#666;text-align:center;padding:20px;">加载中...</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let adminPassword = localStorage.getItem('pebble_admin_password') || '';
        let relayUrl = localStorage.getItem('pebble_relay_url') || 'http://115.29.162.18:8977';

        document.getElementById('serverUrl').textContent = relayUrl;

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast' + (isError ? ' error' : '');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 4000);
        }

        async function login() {
            const password = document.getElementById('password').value;
            
            if (!password) {
                showToast('请填写管理员密码', true);
                return;
            }
            
            // Verify password by calling admin info endpoint with X-Admin-Token header
            try {
                const resp = await fetch(`${relayUrl}/api/v1/admin/info`, {
                    headers: { 'X-Admin-Token': password }
                });
                
                if (resp.ok) {
                    adminPassword = password;
                    localStorage.setItem('pebble_admin_password', password);
                    localStorage.setItem('pebble_relay_url', relayUrl);
                    showDashboard();
                } else {
                    showToast('登录失败', true);
                }
            } catch (e) {
                showToast('网络错误：' + e.message, true);
            }
        }

        function logout() {
            localStorage.removeItem('pebble_admin_password');
            adminPassword = '';
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            document.getElementById('adminName').classList.add('hidden');
        }

        async function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            await checkDbStatus();
            await loadStats();
            await loadUsers();
        }

        async function checkDbStatus() {
            const box = document.getElementById('dbStatusBox');
            try {
                const resp = await fetch(`${relayUrl}/api/v1/admin/check`, {
                    headers: { 'X-Admin-Token': adminPassword }
                });
                
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.db_ok) {
                        box.style.display = 'block';
                        box.style.background = 'rgba(0,255,136,0.1)';
                        box.style.borderColor = 'rgba(0,255,136,0.3)';
                        box.innerHTML = '✅ 数据库连接正常，用户管理功能可用';
                    } else {
                        box.style.display = 'block';
                        box.style.background = 'rgba(255,82,82,0.1)';
                        box.style.borderColor = 'rgba(255,82,82,0.3)';
                        box.innerHTML = '⚠️ 数据库错误：' + (data.message || '未知错误');
                    }
                } else {
                    box.style.display = 'block';
                    box.style.background = 'rgba(255,82,82,0.1)';
                    box.innerHTML = '⚠️ 连接检查失败';
                }
            } catch (e) {
                box.style.display = 'block';
                box.style.background = 'rgba(255,82,82,0.1)';
                box.innerHTML = '⚠️ 网络错误';
            }
        }

        async function loadStats() {
            try {
                const resp = await fetch(`${relayUrl}/api/v1/admin/info`, {
                    headers: { 'X-Admin-Token': adminPassword }
                });
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('statUsers').textContent = data.user_count || 0;
                    document.getElementById('statInstances').textContent = data.instance_count || 0;
                    document.getElementById('statWatches').textContent = data.watch_count || 0;
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function createUser() {
            const name = document.getElementById('newUserName').value.trim();
            if (!name) {
                showToast('请输入用户名称', true);
                return;
            }

            const btn = document.querySelector('.create-user-form button');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>创建中...';

            try {
                const resp = await fetch(`${relayUrl}/api/v1/admin/users`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Token': adminPassword
                    },
                    body: JSON.stringify({ name: name })
                });

                const data = await resp.json();
                
                if (resp.ok && data.user_token) {
                    document.getElementById('tokenValue').textContent = data.user_token;
                    document.getElementById('tokenDisplay').classList.remove('hidden');
                    document.getElementById('newUserName').value = '';
                    showToast('用户创建成功');
                    await loadUsers();
                    await loadStats();
                } else {
                    showToast(data.error || '创建失败', true);
                }
            } catch (e) {
                showToast('网络错误：' + e.message, true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '创建';
            }
        }

        async function loadUsers() {
            const list = document.getElementById('userList');
            try {
                const resp = await fetch(`${relayUrl}/api/v1/admin/users`, {
                    headers: { 'X-Admin-Token': adminPassword }
                });
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('userCountBadge').textContent = data.total || 0;
                    
                    if (data.users && data.users.length) {
                        list.innerHTML = data.users.map(u => {
                            const instances = u.instances || [];
                            const watches = u.watches || [];
                            const token = u.user_token || '';
                            const maskedToken = token ? token.substring(0, 8) + '****' + token.substring(token.length - 4) : '-';
                            
                            const instHtml = instances.length 
                                ? instances.map(i => `
                                    <div class="instance-item">
                                        <span class="inst-name">${i.name || '未命名实例'}</span>
                                        <span class="inst-id">${i.id}</span>
                                    </div>
                                `).join('')
                                : '<div class="no-instances">暂无实例</div>';
                            
                            return `
                                <div class="user-item">
                                    <div class="user-header">
                                        <div class="user-info">
                                            <div class="name">${u.name || '未命名'}</div>
                                            <div class="id">ID: ${u.id}</div>
                                            <div class="created">创建: ${u.created_at || '-'}</div>
                                        </div>
                                        <div class="user-actions">
                                            <button class="btn-danger btn-sm" onclick="deleteUser('${u.id}')">删除</button>
                                        </div>
                                    </div>
                                    <div class="user-stats-row">
                                        <span class="stat-badge">实例: ${instances.length}</span>
                                        <span class="stat-badge">手表: ${watches.length}</span>
                                        <span class="stat-badge token-badge" onclick="showFullToken('${token}', '${u.name}')" title="点击查看完整Token">Token: ${maskedToken}</span>
                                    </div>
                                    <div class="instance-list">
                                        <div style="font-size:11px;color:#555;margin-bottom:4px;">实例</div>
                                        ${instHtml}
                                    </div>
                                </div>
                            `;
                        }).join('');
                    } else {
                        list.innerHTML = '<p style="color:#666;text-align:center;padding:20px;">暂无用户</p>';
                    }
                } else {
                    list.innerHTML = '<p style="color:#ff6b6b;text-align:center;padding:20px;">加载失败</p>';
                }
            } catch (e) {
                list.innerHTML = '<p style="color:#ff6b6b;text-align:center;padding:20px;">网络错误</p>';
            }
        }

        function showFullToken(token, name) {
            prompt(`用户「${name}」的完整 Token（请复制后妥善保管，刷新页面后需重新查看）：`, token);
        }

        async function deleteUser(userId) {
            if (!confirm('确定删除该用户？此操作不可恢复。')) return;
            try {
                const resp = await fetch(`${relayUrl}/api/v1/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'X-Admin-Token': adminPassword }
                });
                if (resp.ok) {
                    showToast('用户已删除');
                    await loadUsers();
                    await loadStats();
                } else {
                    const data = await resp.json();
                    showToast(data.error || '删除失败', true);
                }
            } catch (e) {
                showToast('网络错误', true);
            }
        }

        // Auto-login if token exists
        if (adminPassword) {
            showDashboard();
        }
    </script>
</body>
</html>
